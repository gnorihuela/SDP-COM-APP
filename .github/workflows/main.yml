name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          # 1. Instalación de las herramientas necesarias
          pip install flet pdfplumber
          
          # 2. Aceptación de licencias con ruta absoluta
          # Esto evita el error de "command not found" del sdkmanager
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 3. Crear flet.toml (Configuración mínima que no da errores)
          echo "[app]" > flet.toml
          echo "name = 'SDP-COM'" >> flet.toml
          echo "package_name = 'com.sdp.app'" >> flet.toml
          echo "main_module = 'main'" >> flet.toml
          
          # 4. Crear carpeta assets para evitar errores de ruta
          mkdir -p assets
          if [ -f "torre-de-control.png" ]; then
            cp torre-de-control.png assets/icon.png
          fi

          # 5. Construcción estándar
          # Quitamos --no-splash para evitar el error de argumentos
          flet build apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
