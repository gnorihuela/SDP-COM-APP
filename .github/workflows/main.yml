name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          # 1. Instalar Flet
          pip install flet pdfplumber
          
          # 2. Aceptar licencias (Ruta universal de GitHub)
          yes | sdkmanager --licenses || true
          
          # 3. BORRAR CUALQUIER FLET.TOML PREVIO Y CREAR UNO NUEVO LIMPIO
          # Usamos 'printf' en lugar de 'echo' para asegurar que no hay caracteres raros
          rm -f flet.toml
          printf "[app]\nname = \"sdpapp\"\npackage_name = \"com.sdp.app\"\nmain_module = \"main\"\n" > flet.toml
          
          # 4. CONSTRUCCIÓN LIMPIA
          # Sin argumentos extra que den error, solo el proyecto
          flet build apk --project .

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
