name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          # 1. Instalación de dependencias
          pip install "flet[all]" pdfplumber
          
          # 2. CREACIÓN DEL ARCHIVO DE CONFIGURACIÓN (flet.toml)
          # Esto evita usar comandos de terminal que el servidor rechaza
          echo "[app]" > flet.toml
          echo "name = 'SDP-COM'" >> flet.toml
          echo "package_name = 'com.sdp.app'" >> flet.toml
          echo "" >> flet.toml
          echo "[android]" >> flet.toml
          echo "icon = 'assets/icon.png'" >> flet.toml
          
          # 3. ORGANIZACIÓN DE ARCHIVOS
          # Flet requiere que el icono esté en /assets para el APK
          mkdir -p assets
          cp torre-de-control.png assets/icon.png
          
          # 4. CONSTRUCCIÓN SIN PARÁMETROS
          # Al existir el flet.toml, ya no necesitamos pasar --icon ni --name
          flet build apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
