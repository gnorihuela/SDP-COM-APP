name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK Clean
        run: |
          # 1. Instalamos las herramientas necesarias
          pip install "flet[all]" pdfplumber
          
          # 2. SEGURO DE VIDA: Copiamos tu main.py real a un archivo de respaldo
          cp main.py respaldo_seguro.py
          
          # 3. Limpiamos carpetas viejas para que no haya errores de espacio
          rm -rf build
          
          # 4. CREAMOS LA ESTRUCTURA (Aquí Flet genera su ejemplo del contador)
          flet create .
          
          # 5. RESTAURAMOS TU CÓDIGO (Machacamos el ejemplo con tu respaldo)
          cp -f respaldo_seguro.py main.py
          
          # 6. FABRICAMOS EL APK (Con tu icono y nombre)
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
