name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install "flet[all]" pdfplumber

      - name: Initialize Flutter
        run: flutter doctor

      - name: Build APK
        run: flet build apk --icon torre-de-control.png --name SDP-COM

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk          echo "Archivos del repositorio:"
          ls -R

      - name: Initialize Flutter
        run: flutter doctor

      - name: Build APK
        run: |
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk          echo "Contenido del repo:"
          ls -R

      - name: Build APK
        run: |
          # Inicializamos Flutter (evita errores)
          flutter doctor

          # Construimos el APK
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
