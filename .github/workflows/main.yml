name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          pip install flet pdfplumber
          
          # Aceptar licencias de forma forzada
          yes | sdkmanager --licenses || true
          
          # FORZAR LOS ARGUMENTOS: Si el flet.toml falla, esto lo pisa.
          # Usamos comillas simples para evitar errores de shell.
          flet build apk --project . --name 'sdpapp' --package-name 'com.sdp.app'
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
