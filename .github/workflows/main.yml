name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial para poder rescatar tu main.py original

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK Clean
        run: |
          pip install "flet[all]" pdfplumber
          # Limpieza total de carpetas previas
          rm -rf build
          # Generamos estructura (flet create pisa tu main.py)
          flet create . 
          # RESCATE: Volvemos a poner tu archivo real antes de empaquetar
          git checkout main.py
          # Compilación final con tu icono y nombre de App
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
