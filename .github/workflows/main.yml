name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          # 1. Instalar lo necesario
          pip install flet pdfplumber
          
          # 2. Aceptar licencias (ruta corregida para Ubuntu 24.04)
          yes | sdkmanager --licenses || true
          
          # 3. CONSTRUCCIÓN FORZADA
          # Usamos --project . para que lea SI O SI tu flet.toml
          # Y añadimos --verbose para ver el error real si falla
          flet build apk --project . --verbose

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
