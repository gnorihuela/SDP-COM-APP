name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK Clean
        run: |
          # 1. Instalamos herramientas
          pip install "flet[all]" pdfplumber
          
          # 2. LIMPIEZA Y SEGURIDAD:
          # Guardamos tu main.py real en un archivo temporal
          cp main.py codigo_real.py
          rm -rf build
          
          # 3. PREPARACIÓN:
          # Flet crea la estructura (y aquí es donde borra el main.py)
          flet create .
          
          # 4. RESTAURACIÓN:
          # Borramos el contador de ejemplo y ponemos TU código real encima
          rm main.py
          mv codigo_real.py main.py
          
          # 5. CONSTRUCCIÓN FINAL:
          # Usamos tu icono y nombre de App
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
