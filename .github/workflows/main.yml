name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK Clean
        run: |
          pip install "flet[all]" pdfplumber
          rm -rf build
          # 1. HACER COPIA DE SEGURIDAD de tu código real
          cp main.py main_backup.py
          # 2. CREAR ESTRUCTURA (Esto crea el código del contador "+")
          flet create .
          # 3. RESTAURAR TU CÓDIGO REAL (Borramos el "+" y ponemos el tuyo)
          mv main_backup.py main.py
          # 4. CONSTRUIR APK (Con tu icono y nombre)
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
