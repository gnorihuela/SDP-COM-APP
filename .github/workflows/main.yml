name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # OBLIGATORIO: Permite a GitHub recuperar tu main.py real

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK Clean
        run: |
          pip install "flet[all]" pdfplumber
          rm -rf build
          # 1. Crea la estructura (aquí se borra tu main.py momentáneamente)
          flet create . 
          # 2. SEGURO DE VIDA: Recupera tu código real 'SDP-COM COMMAND CENTER'
          git checkout main.py
          # 3. Fabricamos con tu icono y nombre real
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
