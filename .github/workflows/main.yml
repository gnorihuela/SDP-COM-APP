name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          # 1. Instalación de dependencias
          pip install flet pdfplumber
          
          # 2. Aceptar licencias usando la ruta absoluta de Android Home
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 3. Crear flet.toml (IMPORTANTE: Nombre en minúsculas y sin guiones raros)
          echo "[app]" > flet.toml
          echo "name = 'sdpcom'" >> flet.toml
          echo "package_name = 'com.sdp.app'" >> flet.toml
          echo "main_module = 'main'" >> flet.toml
          echo "" >> flet.toml
          echo "[android]" >> flet.toml
          echo "permissions = ['READ_EXTERNAL_STORAGE', 'WRITE_EXTERNAL_STORAGE']" >> flet.toml
          
          # 4. Asegurar carpeta assets
          mkdir -p assets
          if [ -f "torre-de-control.png" ]; then
            cp torre-de-control.png assets/icon.png
          fi

          # 5. Construcción limpia
          flet build apk --project .

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
