name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          # 1. Instalación de dependencias
          pip install flet pdfplumber
          
          # 2. ACEPTAR LICENCIAS DE ANDROID (Esto es lo que falta)
          # Enviamos "y" (yes) a todas las licencias del SDK de Android
          yes | sdkmanager --licenses || true
          
          # 3. Configuración del proyecto
          echo "[app]" > flet.toml
          echo "name = 'SDP-COM'" >> flet.toml
          echo "package_name = 'com.sdp.app'" >> flet.toml
          echo "main_module = 'main'" >> flet.toml
          
          # 4. Iconos
          mkdir -p assets
          if [ -f "torre-de-control.png" ]; then
            cp torre-de-control.png assets/icon.png
          fi

          # 5. Construcción
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
