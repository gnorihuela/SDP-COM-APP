name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          # 1. Instalamos las herramientas
          pip install "flet[all]" pdfplumber
          
          # 2. CREAMOS UNA CARPETA LIMPIA
          # Esto evita cualquier error de "la carpeta no está vacía"
          flet create sdp_app_folder
          
          # 3. COPIAMOS TUS ARCHIVOS DENTRO
          # Metemos tu main.py real y tu icono en esa carpeta nueva
          cp main.py sdp_app_folder/main.py
          cp torre-de-control.png sdp_app_folder/torre-de-control.png
          
          # 4. FABRICAMOS EL APK DESDE DENTRO
          cd sdp_app_folder
          flet build apk --icon torre-de-control.png --name "SDP-COM"
          
          # 5. MOVEMOS EL RESULTADO AL SITIO CORRECTO
          # Para que el paso final de GitHub encuentre el archivo
          cd ..
          mkdir -p build/apk
          mv sdp_app_folder/build/apk/*.apk build/apk/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
