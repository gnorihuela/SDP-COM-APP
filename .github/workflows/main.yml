name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet==0.21.0 pdfplumber

      - name: Build APK
        run: |
          flet create . --name "sdp_com"
          flet build apk
          # Este paso es clave: busca el APK y lo pone en la carpeta principal
          mkdir -p output_apk
          find build -name "*.apk" -exec cp {} output_apk/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App-Instalable
          path: output_apk/*.apk
