name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet pdfplumber

      - name: Build APK
        run: |
          # Usamos python -m flet para asegurar que encuentra el ejecutable
          python -m flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: SDP-COM-App-Instalable
          path: build/apk/*.apk
