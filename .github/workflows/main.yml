name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          pip install "flet[all]" pdfplumber
          
          # 1. GUARDAMOS TU CÓDIGO (Para que el --force no lo destruya)
          cp main.py main_backup.py
          
          # 2. SOLUCIÓN AL ERROR: Forzamos la creación de la estructura necesaria
          # Esto elimina el error "destination path '.' already exists"
          flet create --force .
          
          # 3. RESTAURACIÓN: Borramos el archivo de ejemplo y ponemos el tuyo real
          rm main.py
          mv main_backup.py main.py
          
          # 4. CONSTRUCCIÓN: Ahora sí, con todo listo, fabricamos el APK
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
