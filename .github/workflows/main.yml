name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet pdfplumber

      - name: Create Project and Build APK
        run: |
          # 1. Forzamos la creación del proyecto para que no falte ningún archivo de configuración
          flet create . --name "SDP_COM"
          
          # 2. Intentamos la construcción del APK
          flet build apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App-Instalable
          path: build/apk/*.apk
