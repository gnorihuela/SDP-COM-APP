name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Esto es nuevo: permite a Git recuperar archivos borrados

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK Clean
        run: |
          pip install "flet[all]" pdfplumber
          # Tu limpieza que funcionó
          rm -rf build
          # Tu comando que generó el pubspec perfecto
          flet create . 
          # EL TRUCO: Aquí recuperamos TU main.py antes de que se empaquete
          git checkout main.py
          # Construimos con tu icono y el nombre real de la app
          flet build apk --icon torre-de-control.png --name "SDP-COM"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
