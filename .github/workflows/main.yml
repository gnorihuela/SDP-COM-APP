name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build APK
        run: |
          # 1. Instalar herramientas
          pip install flet pdfplumber
          
          # 2. Aceptar licencias
          yes | sdkmanager --licenses || true
          
          # 3. Crear flet.toml minimalista (Sin Splash Screen para evitar errores)
          echo "[app]" > flet.toml
          echo "name = 'SDP-COM'" >> flet.toml
          echo "package_name = 'com.sdp.app'" >> flet.toml
          echo "main_module = 'main'" >> flet.toml
          echo "" >> flet.toml
          echo "[android]" >> flet.toml
          
          # 4. Crear carpeta de assets vacía por si acaso
          mkdir -p assets
          
          # 5. CONSTRUCCIÓN LIMPIA
          # --no-splash evita el error de la pantalla negra por falta de imágenes
          flet build apk --no-splash

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
