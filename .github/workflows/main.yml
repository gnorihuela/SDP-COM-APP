name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK Clean
        run: |
          # 1. Instalamos flet y pdfplumber
          pip install "flet[all]" pdfplumber
          
          # 2. Creamos una carpeta de proyecto nueva para evitar errores de "carpeta no vacía"
          python3 -m flet create sdp_app
          
          # 3. Metemos TU código real dentro (sobrescribiendo el contador)
          cp main.py sdp_app/main.py
          
          # 4. TRUCO DEL ICONO: Lo ponemos donde Flet lo busca por defecto
          # Esto evita tener que usar el argumento --icon que está fallando
          mkdir -p sdp_app/assets
          cp torre-de-control.png sdp_app/assets/icon.png
          
          # 5. CONSTRUCCIÓN: Usamos python3 -m flet para que sea más estable
          cd sdp_app
          python3 -m flet build apk --name "SDP-COM"
          
          # 6. Preparamos la salida para el Upload
          cd ..
          mkdir -p build/apk
          mv sdp_app/build/apk/*.apk build/apk/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SDP-COM-App
          path: build/apk/*.apk
